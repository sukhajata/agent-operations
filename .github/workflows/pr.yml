name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  langgraph-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langgraph-agents
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.9"
      - run: uv sync
      - run: uv run ruff check .

  langgraph-type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langgraph-agents
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.9"
      - run: uv sync
      - run: uv run mypy --strict -p agents -p shared -p schema -p config -p tools -p functions

  langgraph-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langgraph-agents
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.9"
      - run: uv sync
      - run: uv run pytest tests/unit/ --cov=shared --cov=agents --cov=functions --cov-fail-under=80

  coding-agent-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coding-agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.9"
      - run: uv sync
      - run: uv run ruff check .

  coding-agent-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coding-agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.9"
      - run: uv sync
      - run: uv run pytest tests/ -v
