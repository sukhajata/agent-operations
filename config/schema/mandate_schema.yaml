# JSON Schema for exploratory agent mandate definitions
type: object
required: [name, domain, polling_interval_minutes, signal_threshold]
properties:
  name:
    type: string
  domain:
    type: string
  agent_type:
    type: string
    enum: [free, focus]
    default: free
  polling_interval_minutes:
    type: integer
  signal_threshold:
    type: number
    minimum: 0.0
    maximum: 1.0
