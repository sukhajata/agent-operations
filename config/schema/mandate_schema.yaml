# JSON Schema for exploratory agent mandate definitions
type: object
required: [name, domain, polling_interval_minutes, signal_threshold]
properties:
  name:
    type: string
  domain:
    type: string
  agent_type:
    type: string
    enum: [free, focus]
    default: free
  focus_id:
    type: string
    minLength: 1
  polling_interval_minutes:
    type: integer
  signal_threshold:
    type: number
    minimum: 0.0
    maximum: 1.0
allOf:
  - if:
      properties:
        agent_type:
          const: focus
      required: [agent_type]
    then:
      required: [focus_id]
